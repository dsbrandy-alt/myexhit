[build]
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/api/naver-search"
  to = "/.netlify/functions/naver-search"
  status = 200

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Content-Type = "text/babel; charset=utf-8"
